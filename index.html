<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundStage - Concert Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; }
        .gradient-text { background: linear-gradient(90deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans antialiased">
    <nav class="border-b border-gray-800 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider gradient-text">SOUNDSTAGE</h1>
            <div>
                <button onclick="loadBookings()" class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-full transition mr-2">My Bookings</button>
                <button onclick="toggleAdmin()" class="text-sm bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-full transition">Admin Panel</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-extrabold mb-4 uppercase">Live <span class="gradient-text">Concerts</span></h2>
            <p class="text-gray-400">Handpicked live music experiences. Your next favourite night starts here.</p>
        </div>

        <div id="concerts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Concerts will load here -->
        </div>

        <div id="admin-section" class="hidden mt-8 bg-gray-900 border border-gray-800 p-6 rounded-xl">
            <h3 class="text-2xl font-bold mb-6 border-b border-gray-800 pb-2">Admin Panel - Add Concert</h3>
            <form id="add-concert-form" onsubmit="addConcert(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Concert Name</label>
                        <input type="text" id="concert-name" required class="w-full bg-gray-800 text-white border border-gray-700 rounded p-2 focus:border-orange-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Date & Time</label>
                        <input type="datetime-local" id="concert-date" required class="w-full bg-gray-800 text-white border border-gray-700 rounded p-2 focus:border-orange-500 focus:outline-none" style="color-scheme: dark;">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Total Seats</label>
                        <input type="number" id="concert-seats" required min="1" class="w-full bg-gray-800 text-white border border-gray-700 rounded p-2 focus:border-orange-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Price (₹)</label>
                        <input type="number" id="concert-price" required min="0" step="0.01" class="w-full bg-gray-800 text-white border border-gray-700 rounded p-2 focus:border-orange-500 focus:outline-none">
                    </div>
                </div>
                <button type="submit" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-6 rounded transition">Add Concert</button>
            </form>
        </div>

        <div id="bookings-section" class="hidden mt-16">
            <h3 class="text-2xl font-bold mb-6 border-b border-gray-800 pb-2">Recent Bookings</h3>
            <div id="bookings-container" class="space-y-4"></div>
        </div>
    </main>

    <script>
        // Fetch and display concerts
        async function loadConcerts() {
            try {
                const res = await fetch('/concerts');
                const data = await res.json();
                const container = document.getElementById('concerts-container');
                container.innerHTML = '';
                
                data.forEach(c => {
                    const date = new Date(c.date).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
                    container.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 hover:border-orange-500 transition duration-300">
                            <h3 class="text-xl font-bold mb-2">${c.name}</h3>
                            <p class="text-gray-400 text-sm mb-4">📅 ${date}</p>
                            <div class="flex justify-between items-center mb-6 text-sm">
                                <span class="bg-gray-800 px-3 py-1 rounded-md text-orange-400 font-semibold">₹${c.price}</span>
                                <span class="${c.available_seats > 0 ? 'text-green-400' : 'text-red-500'}">
                                    ${c.available_seats} Seats Left
                                </span>
                            </div>
                            <button onclick="bookTicket(${c.id}, '${c.name}', ${c.available_seats})" 
                                class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                ${c.available_seats === 0 ? 'disabled' : ''}>
                                ${c.available_seats === 0 ? 'SOLD OUT' : 'BOOK NOW'}
                            </button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error loading concerts:", err);
            }
        }

        // Handle booking
        async function bookTicket(concertId, concertName, availableSeats) {
            const userName = prompt(`Booking for: ${concertName}\nEnter your name:`);
            if (!userName) return;

            const tickets = parseInt(prompt(`How many tickets? (Max ${availableSeats})`));
            if (!tickets || tickets < 1 || tickets > availableSeats) {
                alert("Invalid ticket quantity!");
                return;
            }

            try {
                const res = await fetch('/book', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ concert_id: concertId, user_name: userName, tickets_booked: tickets })
                });
                
                const result = await res.json();
                if (res.ok) {
                    alert('Ticket Booked Successfully! 🎉');
                    loadConcerts(); // Refresh data
                } else {
                    alert('Error: ' + result.detail);
                }
            } catch (err) {
                alert("Failed to connect to server.");
            }
        }

        // Fetch and display bookings
        async function loadBookings() {
            const section = document.getElementById('bookings-section');
            const container = document.getElementById('bookings-container');
            section.classList.toggle('hidden');
            
            if (!section.classList.contains('hidden')) {
                document.getElementById('admin-section').classList.add('hidden');
                const res = await fetch('/bookings');
                const data = await res.json();
                container.innerHTML = data.length ? '' : '<p class="text-gray-500">No bookings yet.</p>';
                
                data.forEach(b => {
                    container.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-lg flex justify-between items-center">
                            <div>
                                <p class="font-bold text-orange-400">${b.user_name}</p>
                                <p class="text-sm text-gray-400">${b.concert_name}</p>
                            </div>
                            <div class="bg-gray-900 px-4 py-2 rounded font-bold text-white">
                                ${b.tickets_booked} Ticket(s)
                            </div>
                        </div>
                    `;
                });
            }
        }

        // Initialize
        loadConcerts();

        // Admin Toggle
        function toggleAdmin() {
            const adminSection = document.getElementById('admin-section');
            const bookingsSection = document.getElementById('bookings-section');
            
            adminSection.classList.toggle('hidden');
            if (!adminSection.classList.contains('hidden')) {
                bookingsSection.classList.add('hidden');
            }
        }

        // Add Concert
        async function addConcert(event) {
            event.preventDefault();
            const name = document.getElementById('concert-name').value;
            let dateInput = document.getElementById('concert-date').value;
            // Format for DB: YYYY-MM-DD HH:MM:SS
            const date = dateInput.replace('T', ' ') + ':00';
            const totalSeats = parseInt(document.getElementById('concert-seats').value);
            const price = parseFloat(document.getElementById('concert-price').value);

            try {
                const res = await fetch('/concerts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, date, total_seats: totalSeats, price })
                });
                
                const result = await res.json();
                if (res.ok) {
                    alert('Concert Added Successfully! 🎉');
                    document.getElementById('add-concert-form').reset();
                    loadConcerts(); // Refresh the grid
                } else {
                    alert('Error: ' + result.detail);
                }
            } catch (err) {
                alert("Failed to connect to server.");
            }
        }
    </script>
</body>
</html>
